# SEC companyfacts -> canonical raw fundamentals mapping contract.
#
# How to read this file:
# 1. Each top-level key under `metrics` is a canonical raw field.
# 2. `tag_priority` is ordered best-to-fallback source tag preference.
# 3. `transform_rule` describes downstream wide-table handling semantics.
# 4. `quality_tier` marks confidence level of the selected signal.
# 5. Helper fields at the bottom are fallback-only and not final screening metrics.
version: "1.1.2"
description: "SEC companyfacts to canonical fundamentals mapping contract"
metrics:
  # Income statement / duration fields that often need Q4 extraction downstream.
  saleq:
    fact_type: duration
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:RevenueFromContractWithCustomerExcludingAssessedTax"
      - "us-gaap:SalesRevenueNet"
      - "us-gaap:Revenues"
      - "us-gaap:RevenueFromContractWithCustomerIncludingAssessedTax"
      - "us-gaap:RevenuesNetOfInterestExpense"
    transform_rule: q4_extract
    quality_tier: primary
  niq:
    fact_type: duration
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:NetIncomeLoss"
      - "us-gaap:ProfitLoss"
    transform_rule: q4_extract
    quality_tier: primary
  oiadpq:
    fact_type: duration
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:OperatingIncomeLoss"
      - "us-gaap:IncomeLossFromOperationsBeforeIncomeTaxesExtraordinaryItemsNoncontrollingInterest"
      - "us-gaap:IncomeLossFromContinuingOperationsBeforeIncomeTaxesExtraordinaryItemsNoncontrollingInterest"
    transform_rule: q4_extract
    quality_tier: primary
  xintq:
    fact_type: duration
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:InterestExpense"
      - "us-gaap:InterestExpenseNet"
      - "us-gaap:InterestAndDebtExpense"
      - "us-gaap:InterestExpenseDebt"
      - "us-gaap:InterestExpenseBorrowings"
      - "us-gaap:InterestExpenseNonoperating"
      - "us-gaap:InterestExpenseShortTermBorrowings"
      - "us-gaap:InterestIncomeExpenseNet"
      - "us-gaap:InterestRevenueExpenseNet"
    transform_rule: q4_extract
    quality_tier: primary
  txtq:
    fact_type: duration
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:IncomeTaxExpenseBenefit"
      - "us-gaap:IncomeTaxesPaidNet"
      - "us-gaap:IncomeTaxExpenseBenefitContinuingOperations"
    transform_rule: q4_extract
    quality_tier: primary
  epspxq:
    fact_type: duration
    unit_priority: ["USD/shares"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:EarningsPerShareDiluted"
      - "us-gaap:EarningsPerShareBasic"
      - "us-gaap:IncomeLossFromContinuingOperationsPerDilutedShare"
    transform_rule: q4_extract
    quality_tier: primary
  # Balance sheet / instant fields expected to map directly from point-in-time tags.
  actq:
    fact_type: instant
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:AssetsCurrent"
    transform_rule: direct
    quality_tier: primary
  lctq:
    fact_type: instant
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:LiabilitiesCurrent"
    transform_rule: direct
    quality_tier: primary
  ppentq:
    fact_type: instant
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:PropertyPlantAndEquipmentNet"
      - "us-gaap:PropertyPlantAndEquipmentAndFinanceLeaseRightOfUseAssetAfterAccumulatedDepreciationAndAmortization"
    transform_rule: direct
    quality_tier: primary
  gdwlq:
    fact_type: instant
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:Goodwill"
    transform_rule: direct
    quality_tier: primary
  ivltq:
    fact_type: instant
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:NoncurrentInvestments"
      - "us-gaap:LongTermInvestments"
      - "us-gaap:Investments"
      - "us-gaap:AvailableForSaleSecuritiesNoncurrent"
      - "us-gaap:ShortTermInvestments"
      - "us-gaap:MarketableSecuritiesCurrent"
    component_tags:
      - "us-gaap:AvailableForSaleSecuritiesDebtSecuritiesNoncurrent"
      - "us-gaap:HeldToMaturitySecuritiesNoncurrent"
      - "us-gaap:MarketableSecuritiesNoncurrent"
      - "us-gaap:EquityMethodInvestments"
      - "us-gaap:OtherInvestmentsNoncurrent"
    transform_rule: direct_or_sum_components
    quality_tier: fallback
  atq:
    fact_type: instant
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:Assets"
    transform_rule: direct
    quality_tier: primary
  ceqq:
    fact_type: instant
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:CommonStockholdersEquity"
      - "us-gaap:StockholdersEquity"
      - "us-gaap:StockholdersEquityIncludingPortionAttributableToNoncontrollingInterest"
    transform_rule: direct
    quality_tier: primary
  dlcq:
    fact_type: instant
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:DebtCurrent"
      - "us-gaap:LongTermDebtCurrent"
      - "us-gaap:ShortTermBorrowings"
      - "us-gaap:ShortTermDebt"
      - "us-gaap:CommercialPaper"
      - "us-gaap:NotesPayableCurrent"
    transform_rule: direct
    quality_tier: primary
  dlttq:
    fact_type: instant
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:LongTermDebtNoncurrent"
      - "us-gaap:LongTermDebt"
      - "us-gaap:SeniorNotes"
      - "us-gaap:OtherLongTermDebtNoncurrent"
    transform_rule: direct
    quality_tier: primary
  req:
    fact_type: instant
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:RetainedEarningsAccumulatedDeficit"
      - "us-gaap:RetainedEarningsAppropriated"
    transform_rule: direct
    quality_tier: primary
  tstkq:
    fact_type: instant
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:TreasuryStockValue"
      - "us-gaap:TreasuryStock"
      - "us-gaap:TreasuryStockCommonValue"
      - "us-gaap:TreasuryStockValueAcquiredCostMethod"
    transform_rule: direct
    quality_tier: primary
  oancfq:
    fact_type: duration
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:NetCashProvidedByUsedInOperatingActivities"
      - "us-gaap:NetCashProvidedByUsedInOperatingActivitiesContinuingOperations"
    helper_fallbacks: ["oancfy"]
    transform_rule: direct_with_annual_fallback
    quality_tier: primary
  prstkcq:
    fact_type: duration
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:PaymentsForRepurchaseOfCommonStock"
      - "us-gaap:PaymentsForRepurchaseOfEquity"
      - "us-gaap:StockRepurchasedDuringPeriodValue"
    helper_fallbacks: ["prstkcy", "cshopq"]
    transform_rule: direct_with_annual_fallback
    quality_tier: primary
  capxq:
    fact_type: duration
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:PaymentsToAcquirePropertyPlantAndEquipment"
      - "us-gaap:CapitalExpendituresIncurredButNotYetPaid"
      - "us-gaap:PaymentsToAcquireProductiveAssets"
    transform_rule: q4_extract
    quality_tier: primary
  cheq:
    fact_type: instant
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:CashAndCashEquivalentsAtCarryingValue"
      - "us-gaap:CashCashEquivalentsRestrictedCashAndRestrictedCashEquivalents"
      - "us-gaap:Cash"
    transform_rule: direct
    quality_tier: primary
  dvpq:
    fact_type: duration
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:PaymentsOfDividends"
      - "us-gaap:PaymentsOfDividendsCommonStock"
      - "us-gaap:PaymentsOfOrdinaryDividends"
      - "us-gaap:DividendsCommonStockCash"
      - "us-gaap:DividendsCommonStock"
    transform_rule: q4_extract
    quality_tier: primary
  cshfdq:
    fact_type: duration
    unit_priority: ["shares", "pure"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:WeightedAverageNumberOfDilutedSharesOutstanding"
      - "us-gaap:WeightedAverageNumberOfSharesOutstandingDiluted"
      - "us-gaap:WeightedAverageNumberOfShareOutstandingBasicAndDiluted"
      - "us-gaap:WeightedAverageNumberOfCommonSharesOutstandingDiluted"
    helper_fallbacks: ["cshoq"]
    transform_rule: direct
    quality_tier: primary
  # Helper fallback fields used by `helper_fallbacks` in primary mappings.
  oancfy:
    fact_type: duration
    unit_priority: ["USD"]
    form_priority: ["10-K"]
    tag_priority:
      - "us-gaap:NetCashProvidedByUsedInOperatingActivities"
      - "us-gaap:NetCashProvidedByUsedInOperatingActivitiesContinuingOperations"
    transform_rule: direct
    quality_tier: fallback
  capxy:
    fact_type: duration
    unit_priority: ["USD"]
    form_priority: ["10-K"]
    tag_priority:
      - "us-gaap:PaymentsToAcquirePropertyPlantAndEquipment"
      - "us-gaap:CapitalExpendituresIncurredButNotYetPaid"
      - "us-gaap:PaymentsToAcquireProductiveAssets"
    transform_rule: direct
    quality_tier: fallback
  prstkcy:
    fact_type: duration
    unit_priority: ["USD"]
    form_priority: ["10-K"]
    tag_priority:
      - "us-gaap:PaymentsForRepurchaseOfCommonStock"
      - "us-gaap:PaymentsForRepurchaseOfEquity"
    transform_rule: direct
    quality_tier: fallback
  cshopq:
    fact_type: duration
    unit_priority: ["shares", "pure"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:StockRepurchasedDuringPeriodShares"
      - "us-gaap:CommonStockSharesRepurchased"
      - "us-gaap:SharesRepurchased"
    transform_rule: direct
    quality_tier: proxy
  cshoq:
    fact_type: instant
    unit_priority: ["shares", "pure"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "dei:EntityCommonStockSharesOutstanding"
      - "us-gaap:CommonStockSharesOutstanding"
      - "us-gaap:CommonStockOtherSharesOutstanding"
    transform_rule: direct
    quality_tier: fallback
