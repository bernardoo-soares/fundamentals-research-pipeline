version: "1.0.0"
description: "SEC companyfacts to canonical fundamentals mapping contract"
metrics:
  saleq:
    fact_type: duration
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:RevenueFromContractWithCustomerExcludingAssessedTax"
      - "us-gaap:SalesRevenueNet"
      - "us-gaap:Revenues"
    transform_rule: q4_extract
    quality_tier: primary
  niq:
    fact_type: duration
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:NetIncomeLoss"
      - "us-gaap:ProfitLoss"
    transform_rule: q4_extract
    quality_tier: primary
  oiadpq:
    fact_type: duration
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:OperatingIncomeLoss"
      - "us-gaap:IncomeLossFromOperationsBeforeIncomeTaxesExtraordinaryItemsNoncontrollingInterest"
    transform_rule: q4_extract
    quality_tier: primary
  xintq:
    fact_type: duration
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:InterestExpense"
      - "us-gaap:InterestAndDebtExpense"
      - "us-gaap:InterestExpenseDebt"
      - "us-gaap:InterestExpenseBorrowings"
    transform_rule: q4_extract
    quality_tier: primary
  txtq:
    fact_type: duration
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:IncomeTaxExpenseBenefit"
      - "us-gaap:IncomeTaxesPaidNet"
      - "us-gaap:IncomeTaxExpenseBenefitContinuingOperations"
    transform_rule: q4_extract
    quality_tier: primary
  epspxq:
    fact_type: duration
    unit_priority: ["USD/shares"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:EarningsPerShareDiluted"
      - "us-gaap:EarningsPerShareBasic"
    transform_rule: q4_extract
    quality_tier: primary
  actq:
    fact_type: instant
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:AssetsCurrent"
    transform_rule: direct
    quality_tier: primary
  lctq:
    fact_type: instant
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:LiabilitiesCurrent"
    transform_rule: direct
    quality_tier: primary
  ppentq:
    fact_type: instant
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:PropertyPlantAndEquipmentNet"
      - "us-gaap:PropertyPlantAndEquipmentAndFinanceLeaseRightOfUseAssetAfterAccumulatedDepreciationAndAmortization"
    transform_rule: direct
    quality_tier: primary
  gdwlq:
    fact_type: instant
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:Goodwill"
    transform_rule: direct
    quality_tier: primary
  ivltq:
    fact_type: instant
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:NoncurrentInvestments"
      - "us-gaap:LongTermInvestments"
      - "us-gaap:Investments"
    component_tags:
      - "us-gaap:AvailableForSaleSecuritiesDebtSecuritiesNoncurrent"
      - "us-gaap:HeldToMaturitySecuritiesNoncurrent"
      - "us-gaap:MarketableSecuritiesNoncurrent"
      - "us-gaap:EquityMethodInvestments"
      - "us-gaap:OtherInvestmentsNoncurrent"
    transform_rule: direct_or_sum_components
    quality_tier: fallback
  atq:
    fact_type: instant
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:Assets"
    transform_rule: direct
    quality_tier: primary
  ceqq:
    fact_type: instant
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:CommonStockholdersEquity"
      - "us-gaap:StockholdersEquity"
      - "us-gaap:StockholdersEquityIncludingPortionAttributableToNoncontrollingInterest"
    transform_rule: direct
    quality_tier: primary
  dlcq:
    fact_type: instant
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:DebtCurrent"
      - "us-gaap:LongTermDebtCurrent"
      - "us-gaap:ShortTermBorrowings"
      - "us-gaap:ShortTermDebt"
    transform_rule: direct
    quality_tier: primary
  dlttq:
    fact_type: instant
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:LongTermDebtNoncurrent"
      - "us-gaap:LongTermDebt"
    transform_rule: direct
    quality_tier: primary
  req:
    fact_type: instant
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:RetainedEarningsAccumulatedDeficit"
      - "us-gaap:RetainedEarningsAppropriated"
    transform_rule: direct
    quality_tier: primary
  tstkq:
    fact_type: instant
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:TreasuryStockValue"
      - "us-gaap:TreasuryStock"
    transform_rule: direct
    quality_tier: primary
  oancfq:
    fact_type: duration
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:NetCashProvidedByUsedInOperatingActivities"
      - "us-gaap:NetCashProvidedByUsedInOperatingActivitiesContinuingOperations"
    helper_fallbacks: ["oancfy"]
    transform_rule: direct_with_annual_fallback
    quality_tier: primary
  prstkcq:
    fact_type: duration
    unit_priority: ["USD"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:PaymentsForRepurchaseOfCommonStock"
      - "us-gaap:PaymentsForRepurchaseOfEquity"
    helper_fallbacks: ["prstkcy", "cshopq"]
    transform_rule: direct_with_annual_fallback
    quality_tier: primary
  oancfy:
    fact_type: duration
    unit_priority: ["USD"]
    form_priority: ["10-K"]
    tag_priority:
      - "us-gaap:NetCashProvidedByUsedInOperatingActivities"
      - "us-gaap:NetCashProvidedByUsedInOperatingActivitiesContinuingOperations"
    transform_rule: direct
    quality_tier: fallback
  prstkcy:
    fact_type: duration
    unit_priority: ["USD"]
    form_priority: ["10-K"]
    tag_priority:
      - "us-gaap:PaymentsForRepurchaseOfCommonStock"
      - "us-gaap:PaymentsForRepurchaseOfEquity"
    transform_rule: direct
    quality_tier: fallback
  cshopq:
    fact_type: duration
    unit_priority: ["shares", "pure"]
    form_priority: ["10-Q", "10-K"]
    tag_priority:
      - "us-gaap:StockRepurchasedDuringPeriodShares"
      - "us-gaap:CommonStockSharesRepurchased"
      - "us-gaap:SharesRepurchased"
    transform_rule: direct
    quality_tier: proxy
